services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_TEVO_URL: ${NEXT_PUBLIC_TEVO_URL}
    container_name: nexus-migrator
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "npx",
        "prisma",
        "migrate",
        "deploy",
        "--schema",
        "packages/database/prisma/schema.prisma",
      ]
    restart: "no"

  nexus:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_TEVO_URL: ${NEXT_PUBLIC_TEVO_URL}
    container_name: nexus-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - nexus_media_uploads:/app/apps/nexus/public/uploads/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/public/tevo/site-profile > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  nexus_postgres_data:
  nexus_media_uploads:
